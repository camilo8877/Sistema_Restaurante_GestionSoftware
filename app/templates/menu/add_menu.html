{% extends 'base.html' %}

{% block content %}

<h2>Agregar Plato</h2>

<form method="POST">

    <input type="text"
    name="name"
    placeholder="Nombre del plato">

    <input type="text"
    name="category"
    placeholder="Categoría">

    <input type="number"
    step="0.01"
    name="price"
    placeholder="Precio">

    <button type="submit">Guardar</button>

</form>

{% endblock %}
